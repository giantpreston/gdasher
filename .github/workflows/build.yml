name: Build gdasher binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:

          - os: windows-latest
            target: node18-win-x64
            output: gdasher-win-x64.exe


          - os: ubuntu-latest
            target: node18-linux-x64
            output: gdasher-linux-x64
          - os: ubuntu-latest
            target: node18-linux-arm64
            output: gdasher-linux-arm64


          - os: macos-latest
            target: node18-macos-x64
            output: gdasher-macos-x64
          - os: macos-latest
            target: node18-macos-arm64
            output: gdasher-macos-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18


      - name: Setup pkg cache
        shell: bash
        run: |
          mkdir -p ~/.pkg-cache
          echo "PKG_CACHE_PATH=$HOME/.pkg-cache" >> $GITHUB_ENV

      - name: Install pkg
        shell: bash
        run: npm install -g pkg

      - name: Create package.json for pkg
        shell: bash
        run: |
          cat > package.json <<'JSON'
          {
            "name": "gdasher-build-temp",
            "version": "0.0.0",
            "bin": "index.js",
            "pkg": {
              "assets": [
                "*.js",
                "assets/**/*",
                "*.json",
                "*.md",
                "LICENSE"
              ]
            }
          }
          JSON

      - name: Prepare dist
        shell: bash
        run: mkdir -p dist


      - name: Build with pkg (retry)
        shell: bash
        run: |
          for i in 1 2 3; do
            echo "Build attempt $i"
            pkg index.js \
              --target ${{ matrix.target }} \
              --output dist/${{ matrix.output }} && break
            echo "Retrying..."
            sleep 5
          done

      - name: Set icon (Windows only)
        if: startsWith(matrix.target, 'node18-win')
        shell: bash
        run: |
          npm install -g rcedit

          if [[ "${{ github.ref_name }}" == *-beta ]]; then
            ICON="assets/gdasher256beta.ico"
          else
            ICON="assets/gdasher.ico"
          fi

          npx rcedit "dist/${{ matrix.output }}" --set-icon "$ICON"

      - name: Make executable (non-Windows)
        if: runner.os != 'Windows'
        shell: bash
        run: chmod +x dist/${{ matrix.output }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: dist/${{ matrix.output }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Collect files
        shell: bash
        run: |
          mkdir release
          find dist -type f -exec cp {} release/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: release/*