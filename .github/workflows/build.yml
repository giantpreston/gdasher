name: Build gdasher binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
# oo job scary
  build:
    name: Build ${{ matrix.target }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: node18-win-x64
            output: gdasher-win-x64.exe
          - os: windows-latest
            target: node18-win-arm64
            output: gdasher-win-arm64.exe
          - os: ubuntu-latest
            target: node18-linux-x64
            output: gdasher-linux-x64
          - os: ubuntu-latest
            target: node18-linux-arm64
            output: gdasher-linux-arm64
          - os: macos-latest
            target: node18-macos-x64
            output: gdasher-macos-x64
          - os: macos-latest
            target: node18-macos-arm64
            output: gdasher-macos-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install pkg
        shell: bash
        run: npm install -g pkg

      - name: Create ephemeral package.json for pkg
        shell: bash
        run: |
          cat > package.json <<'JSON'
          {
            "name": "gdasher-build-temp",
            "version": "0.0.0",
            "bin": "index.js",
            "pkg": {
              "assets": [
                "*.js",
                "assets/**/*",
                "*.json",
                "*.md",
                "LICENSE"
              ]
            }
          }
          JSON

      - name: Ensure dist directory
        shell: bash
        run: mkdir -p dist

      - name: Build with pkg
        shell: bash
        run: |
          pkg index.js \
            --target ${{ matrix.target }} \
            --output dist/${{ matrix.output }}

      - name: Set icon on Windows builds
        if: startsWith(matrix.target, 'node18-win')
        shell: bash
        run: |
          npm install -g rcedit
          if [[ "${{ github.ref_name }}" == *-beta ]]; then
            ICON="assets/gdasher256beta.ico"
          else
            ICON="assets/gdasher.ico"
          fi

          echo "Setting icon: $ICON"
          rcedit "dist/${{ matrix.output }}" --set-icon "$ICON"

      - name: Make non-Windows binary executable
        if: runner.os != 'Windows'
        shell: bash
        run: chmod +x dist/${{ matrix.output }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: dist/${{ matrix.output }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten files
        shell: bash
        run: |
          mkdir release
          find dist -type f -exec cp {} release/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: release/*